1-5.scorch = ScorchïḂ is a new turret that takes graphiteï ṁ to build.\nIt uses coal as ammo and is very effective at close range.\n[red]Handle with care!All items stored with coals[white]ïḂḞïḃïḃẅï ṁ[red] will start a fire when they are destoryed![white]
