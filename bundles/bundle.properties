1-4.graphiteprod = To make graphite press working, it needs constant input of coalsï ġ.\n Use distributionî  blocks to send coalï ġ into the graphite pressïḃẅ.\nGraphiteï ṁ will be produced automatically once there are enough coalï ġ stored in graphite pressïḃẅ.\nNotice that the graphite press have limited graphite storage, use conveyors to make an output!
