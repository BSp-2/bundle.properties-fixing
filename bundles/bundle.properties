sector.rospule-1-3.name = 1-3\nTaiga
sector.rospule-1-3.description = A massive frozen pinewood forest lies here.\nHostile aerial units detected in the approaching attack.\nгҖҢ[salmon]Guardian Presence[white]гҖҚ

1-3.bridge = Bridge conveyorsпў’ can move items across terrain or solid blocks.\n Try using bridge conveyorsпў’ to move leadп · out of the cave.\nBridge conveyors can be manualy configured to connect with eachother, but usualy the automatic connection should be enough.
1-3.derelict = Derelict blocks are abandoned neutral structures.\nDeconstruct them for resources or repair them to restore functionality. \nHold the B key on your pc or the copy button, then the wrench button on your phone, then select an area you want to reconstruct. 
1-3.bridge2 = Bridge conveyors output simultaneously into multiple directions.\nBridge conveyor's input can also accept multiple inputs simultaneously.
1-3.ammofeed = Supply turrets with ammoп ·/п °
1-3.buildscatter = Aerial units detected. Turrets like duoпЎЎ cannot precisely hit agile aerial targets.\nConstruct scatterпЎ  turrets for anti-air defenses.\nвҡ ScatterпЎ  can only target and hit [accent]air[] units.
1-3.stuffammo = Always pay attention to turret's stats.\nFrequently check the [accent]core database[]оЎӣ to know what items can be used as ammo.\nFind the correct ammo typeп ·п ° to supply the scatterпЎ  with.
