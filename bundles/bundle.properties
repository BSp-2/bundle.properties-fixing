sector.rospule-1-6.name = 1-6\nSnowpiled Coalfield
sector.rospule-1-6.description = Ages ago, the remains of rich plants near the riverbed transformed into gigantic patches of coalsï ġ.\nStart to use coalï ġ to generate powerïḂṗ and learn usage of arcïḂ turret.\nã[salmon]Guardian Presence[white]ã

