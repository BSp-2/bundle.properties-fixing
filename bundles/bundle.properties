1-4.buildpress = Research and place a graphite pressпўҫ.\nIt is located in the craftingо ° tab and [accent]produces[] graphiteп ө.
1-4.graphiteprod = To make the graphite press work, it needs a constant input of coalп і.\n Use distributionо ” blocks to supply the pressпўҫ.\nGraphiteп ө will be produced automatically once there is enough coal in the graphite pressпўҫ.\nThe presses have limited storage, use conveyors to transport the graphite to your core so they don't clog!
1-4.pneumatic = Once you gain access to graphiteп ө, you can construct an upgraded verison of the mechanical drillпЎҜ.\nIt costs [accent]more copper[]п ё and graphite to build than mechanical drills.
1-4.duoammo = Always check the [accent]core database[]оЎӣ! Turrets like duoпЎЎ can also use graphiteп ө as ammmo.\nDuos fire more powerful projectiles when using graphiteп ө as ammo.
