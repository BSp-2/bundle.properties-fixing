1-5.scorch = ScorchпЎҹ is a new turret that takes graphiteп ө to build.\nIt uses coal as ammo and is very effective at close range.\n[red]Handle with care! All buildings with coal[]пЎ°пў–пўҫп ө[red] will start a fire when they are destroyed![white]
