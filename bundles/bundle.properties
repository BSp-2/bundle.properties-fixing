1-1.place = Click on the productionоЎһ tab and select the mechanical drillпЎ°.\nThen click again in a designated area to place the drill on copper oresпЈ„.
1-1.conveyor = Drills can automatically mine copperп ё, yet they need outputs to send resources into your core.\nConstruct a line of conveyorsпў– to connect the drill to your core.
