sector.rospule-4-2.name = 4-2\nTidal Flat
sector.rospule-4-2.description = A narrow delta lies at the downstreams with damp grounds.\nNaval units are coming, use containersпЎҘ to work as [accent]ammo buffers[] and use them to [accent]increase the core storage capacity[].\nLearn the usage of [accent]unloaders[]пЎӨ.

4-2.container = ContainersпЎҘ are capable of [accent]storing different types of[] items.\nпЎӨUnloadersпЎӨ should be used to retrieve the items out of the containers.\nUnloaders will unload items of the selected type from the blocks [accent]adjacent[] to them.
4-2.unloader = UnloadersпЎӨ are like gates that transfer items [accent]instantly[].\n[unlaunched]Unconfigured[] unloaders will unload [unlaunched]every type[] of item the [accent]adjacent[] blocks may have inside.\nPlacing unloaders adjacent to two similar blocks essentially makes them share storage.
4-2.core = Containers [accent]adjacent[] to the core can increase its capacity.\nUnloading from these containers also unloads items from the core.\n[accent]Only containers with direct contact with core can increase the capacity.[]
# --4-3--
sector.rospule-4-3.name = 4-3\nSeaside Promenade
sector.rospule-4-3.description = Following along the coastlines, a narrow sandy passage provided a path for enemies to approach towards the estimated core landing position.\nResources are hard to gather and transfer across islands.\n[accent]RippleпЎ—[] turrets will help with long-range firepower.\nгҖҢ[salmon]Guardian Presence[white]гҖҚ

4-3.ripple = RippleпЎ— turrets are like hailпЎһ that throws projectiles at a longer distance.\n--[accent][High inaccuracy][]--\n--[accent][Targets Ground][]--
# --4-4--
sector.rospule-4-4.name = 4-4\nArchipelago Takeover
sector.rospule-4-4.description = Several islands are under enemy control.\nThese bases have [accent]fatal weakpints[].\nConstruct naval unitsпҹ§пһҲ and horizonsпҹө to take them out.\nгҖҢ[unlaunched]Night Times[white]гҖҚ

4-4.countdown = Enemy units production activating in: {0}
4-4.air = Enemy ripples and lancers are everywhere......\nWait, where are the anti-air turrets?
4-4.power = It seems that placing batteries in an unsafe spot is not a good choice......
4-4.naval = So many parallaxes! Sadly, it seems that they don't know how to aim at ships......
# --4-5--
sector.rospule-4-5.name = 4-5\nForsaken Shipyard
sector.rospule-4-5.description = Once one of the largest shipyards in the seas, now abandoned.\nThis pier has [accent]no titanium ores at all[].\nConstruct [accent]Separators[]пўі to refine titanium out of scrap.\nгҖҢ[accent]Production Sector[white]гҖҚ\nгҖҢ[unlaunched]Night Times[white]гҖҚ

4-5.schematic = To save a schematic, press [accent][F][] on the keyboard/press the copy button on your phone and drag.\nThe selected area can be saved as a schematic or copied as a blueprint to build.\nSchematics will be useful to quickly set up factories or turrets.
4-5.titanium = This sector has [accent]no titanium[]!\nThe titaniums stored in your core is [accent]limited[]. Use it wisely.\nUse [accent]separators[]пўі to get titanium from slag.\nDerelict structures can be deconstructed to retrieve titanium as well.
4-5.pulsar = Pulsar is a ground unit capable of doing multiple things, same as [accent]poly[].\nThey will automatically boost when they are mining, assisting or rebuilding.
